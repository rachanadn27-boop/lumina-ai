name: Lumina Continuous Integration & Release Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------------------------------------------------
  # Job 1: Unit Tests (runs on all 3 OS platforms)
  # ----------------------------------------------------------------
  unit_tests:
    name: Unit Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # npm ci is deterministic and respects package-lock.json
      # --ignore-scripts skips post-install native rebuild steps that
      # are not needed for unit tests (sqlite3 falls back to JSON in test env)
      - name: Install Dependencies
        working-directory: app
        run: npm ci

      # Rebuild native sqlite3 for the current platform/Node version
      # so it can be loaded during tests (avoids "module not found" errors)
      - name: Rebuild Native Modules for Tests
        working-directory: app
        run: npx @electron/rebuild -f -w sqlite3
        continue-on-error: true   # Tests fall back to JSON DB if rebuild fails

      - name: Run TypeScript Type Check
        working-directory: app
        run: npm run typecheck

      - name: Run Unit Tests
        working-directory: app
        run: npm run test:unit

  # ----------------------------------------------------------------
  # Job 2: Production Build (only on ubuntu for speed, after tests pass)
  # ----------------------------------------------------------------
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: unit_tests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        working-directory: app
        run: npm ci

      # electron-builder requires these Linux tools for packaging
      - name: Install Linux packaging tools
        run: sudo apt-get install -y rpm fakeroot dpkg

      - name: Compile & Package App
        working-directory: app
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing in CI
          CSC_IDENTITY_AUTO_DISCOVERY: false
